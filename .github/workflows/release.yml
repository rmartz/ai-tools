name: Release

# Automated releases via release-please. On every push to main it maintains an
# aggregated "release" PR that bumps the changed packages (from Conventional-
# Commit history) and updates their changelogs. Merging that PR creates the
# releases/tags; the publish job then builds and runs `pnpm -r publish` (which
# skips any version already on the registry), so only the bumped packages ship.
on:
  push:
    branches: [main]

permissions:
  contents: write # create releases + the release-PR branch
  pull-requests: write # open/update the release PR

# Serialize release-please across a burst of main merges: run one at a time rather
# than firing several concurrent, API-heavy invocations that can exhaust the
# RELEASE_PLEASE_PAT's shared REST rate limit (observed 2026-07-10 — three merges
# in ~6 min failed the third with "API rate limit already exceeded"). Queue rather
# than cancel: every merge must still be reconciled into the aggregated release PR.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # GITHUB_TOKEN-created PRs don't trigger CI. Set a RELEASE_PLEASE_PAT
          # secret (a PAT with contents + pull-requests write — `repo` scope on a
          # classic PAT) to run CI on the release PR; falls back to the built-in
          # token, which still opens the PR and creates releases but leaves the
          # mechanical release PR without CI.
          token: ${{ secrets.RELEASE_PLEASE_PAT || github.token }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to publish to GitHub Packages
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # pnpm version comes from packageManager in package.json
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@rmartz'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Publish to GitHub Packages
        run: pnpm -r publish --no-git-checks --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
