version: 2
updates:
  - package-ecosystem: npm
    # Monorepo: scan the root manifest and every workspace package so per-package
    # deps (tsup, typescript, commander, zod, …) are covered, not just the root.
    directories:
      - '/'
      - '/packages/*'
    schedule:
      interval: weekly
    # Let new releases age 7 days before opening update PRs, reducing exposure
    # to supply-chain attacks where a malicious version is published then yanked.
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      # `typescript` and `tsup` are declared in EVERY workspace manifest, so an
      # ungrouped bump fans out into one PR per package (root + 9 packages). These
      # per-dependency groups collapse each dep's bump across all directories into a
      # SINGLE multi-directory PR — majors included — so a lockstep bump like
      # typescript 5.9→6.0 is one PR, not ten. Listed first to win group-assignment
      # precedence (each dependency joins the first group whose patterns match).
      typescript:
        patterns:
          - 'typescript'
        update-types:
          - 'major'
          - 'minor'
          - 'patch'
      tsup:
        patterns:
          - 'tsup'
        update-types:
          - 'major'
          - 'minor'
          - 'patch'
      # `prettier` is isolated for a different reason than the two above: a prettier
      # bump (even a minor or patch) can reformat the whole codebase, so it routinely
      # carries required code changes and fails the Format check until the tree is
      # re-formatted. Keeping it in its own PR — separated from unrelated dev-dep
      # bumps — makes that reformat reviewable on its own instead of silently riding
      # along in the grouped dev-dependencies PR. All update-types so every prettier
      # bump lands here.
      prettier:
        patterns:
          - 'prettier'
        update-types:
          - 'major'
          - 'minor'
          - 'patch'
      # Everything else: group only minor/patch bumps. Major bumps fall outside the
      # groups and get individual PRs, since they are more likely to need code
      # changes and are better reviewed in isolation.
      dev-dependencies:
        dependency-type: development
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'
      production-dependencies:
        dependency-type: production
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Let new releases age 7 days before opening update PRs, reducing exposure
    # to supply-chain attacks where a malicious version is published then yanked.
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      include: 'scope'
    # Group all GitHub Actions updates together (major, minor, and patch).
    groups:
      github-actions:
        patterns:
          - '*'
