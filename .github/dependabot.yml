version: 2
updates:
  - package-ecosystem: npm
    # Monorepo: scan the root manifest and every workspace package so per-package
    # deps (tsup, typescript, commander, zod, …) are covered, not just the root.
    directories:
      - '/'
      - '/packages/*'
    schedule:
      interval: weekly
    # Let new releases age 7 days before opening update PRs, reducing exposure
    # to supply-chain attacks where a malicious version is published then yanked.
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      # `typescript` and `tsup` are declared in EVERY workspace manifest, so a MAJOR
      # bump — which the `dev-dependencies` catch-all below does not cover — would
      # otherwise fan out into one PR per package (root + 9 packages). These groups
      # collapse that into a SINGLE multi-directory PR. minor/patch fan-out is already
      # collapsed by `dev-dependencies`, so each group covers only the update types the
      # catch-all leaves out:
      #   - typescript keeps `minor` as well: a minor can shift type inference and fail
      #     the typecheck, so (like prettier) it is isolated in its own PR rather than
      #     batched into dev-dependencies; its patch falls through to dev-dependencies.
      #   - tsup is `major` only: a bundler minor/patch rarely needs code changes, so
      #     those ride dev-dependencies.
      # Listed first to win group-assignment precedence (each dependency joins the first
      # group whose patterns match).
      typescript:
        patterns:
          - 'typescript'
        update-types:
          - 'major'
          - 'minor'
      tsup:
        patterns:
          - 'tsup'
        update-types:
          - 'major'
      # The ESLint toolchain is a version-locked family. `@typescript-eslint/eslint-plugin`
      # and `@typescript-eslint/parser` ship on an IDENTICAL version line and must move
      # together; `eslint` core, the plugins, and the import resolver track eslint's major.
      # Restricted to `major` ONLY: the family is entirely dev, so its minor/patch bumps are
      # already grouped in lockstep by the `dev-dependencies` catch-all below — an all-types
      # group would just split them into a second, redundant PR. `major` is the only update
      # type the catch-alls don't cover, so ungrouped it is where the family fragments into
      # separate, individually-broken per-package PRs (a `@typescript-eslint/*` major on one
      # package but not the other). A family spanning dev AND prod would instead need all
      # update types, since the prod/dev catch-alls would scatter its minor/patch across two
      # PRs; ai-tools has no such family today.
      eslint:
        patterns:
          - 'eslint'
          - '@typescript-eslint/*'
          - 'eslint-plugin-*'
          - 'eslint-import-resolver-*'
        update-types:
          - 'major'
      # `prettier` is isolated for a different reason than the two above: a major or
      # minor prettier bump can reformat the whole codebase, so it routinely carries
      # required code changes and fails the Format check until the tree is
      # re-formatted. Splitting those into their own PR — separated from unrelated
      # dev-dep bumps — makes the reformat reviewable on its own. Only `major`/`minor`
      # are listed: a trivial `patch` bump is unlikely to reformat anything, so it
      # falls through to the `dev-dependencies` group below and rides along with the
      # other minor/patch bumps rather than opening a PR of its own.
      prettier:
        patterns:
          - 'prettier'
        update-types:
          - 'major'
          - 'minor'
      # Everything else: group only minor/patch bumps. Major bumps fall outside the
      # groups and get individual PRs, since they are more likely to need code
      # changes and are better reviewed in isolation.
      dev-dependencies:
        dependency-type: development
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'
      production-dependencies:
        dependency-type: production
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Let new releases age 7 days before opening update PRs, reducing exposure
    # to supply-chain attacks where a malicious version is published then yanked.
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      include: 'scope'
    # Group all GitHub Actions updates together (major, minor, and patch).
    groups:
      github-actions:
        patterns:
          - '*'
