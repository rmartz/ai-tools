version: 2
updates:
  - package-ecosystem: npm
    # Monorepo: scan the root manifest and every workspace package so per-package
    # deps (tsup, typescript, commander, zod, …) are covered, not just the root.
    directories:
      - '/'
      - '/packages/*'
    schedule:
      interval: weekly
    # Let new releases age 7 days before opening update PRs, reducing exposure
    # to supply-chain attacks where a malicious version is published then yanked.
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      # `typescript` and `tsup` are declared in EVERY workspace manifest, so an
      # ungrouped bump fans out into one PR per package (root + 9 packages). These
      # per-dependency groups collapse each dep's bump across all directories into a
      # SINGLE multi-directory PR — majors included — so a lockstep bump like
      # typescript 5.9→6.0 is one PR, not ten. Listed first to win group-assignment
      # precedence (each dependency joins the first group whose patterns match).
      typescript:
        patterns:
          - 'typescript'
        update-types:
          - 'major'
          - 'minor'
          - 'patch'
      tsup:
        patterns:
          - 'tsup'
        update-types:
          - 'major'
          - 'minor'
          - 'patch'
      # The ESLint toolchain is a version-locked family. `@typescript-eslint/eslint-plugin`
      # and `@typescript-eslint/parser` ship on an IDENTICAL version line and must move
      # together — ungrouped, a major would raise them as two separate, individually-broken
      # PRs. `eslint` core, the plugins, and the import resolver track eslint's major, so a
      # lint bump is only coherent when the whole toolchain moves at once. Grouped across ALL
      # update types (major/minor/patch) and listed among the family groups (before the
      # dev/prod catch-alls) so any eslint-ecosystem bump lands as one atomic PR.
      eslint:
        patterns:
          - 'eslint'
          - '@typescript-eslint/*'
          - 'eslint-plugin-*'
          - 'eslint-import-resolver-*'
      # `prettier` is isolated for a different reason than the two above: a major or
      # minor prettier bump can reformat the whole codebase, so it routinely carries
      # required code changes and fails the Format check until the tree is
      # re-formatted. Splitting those into their own PR — separated from unrelated
      # dev-dep bumps — makes the reformat reviewable on its own. Only `major`/`minor`
      # are listed: a trivial `patch` bump is unlikely to reformat anything, so it
      # falls through to the `dev-dependencies` group below and rides along with the
      # other minor/patch bumps rather than opening a PR of its own.
      prettier:
        patterns:
          - 'prettier'
        update-types:
          - 'major'
          - 'minor'
      # Everything else: group only minor/patch bumps. Major bumps fall outside the
      # groups and get individual PRs, since they are more likely to need code
      # changes and are better reviewed in isolation.
      dev-dependencies:
        dependency-type: development
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'
      production-dependencies:
        dependency-type: production
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Let new releases age 7 days before opening update PRs, reducing exposure
    # to supply-chain attacks where a malicious version is published then yanked.
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      include: 'scope'
    # Group all GitHub Actions updates together (major, minor, and patch).
    groups:
      github-actions:
        patterns:
          - '*'
